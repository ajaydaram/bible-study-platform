<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="64" fill="#1e40af"/>
  <g transform="translate(96, 80)">
    <!-- Open Bible -->
    <path d="M0 40 L160 20 L320 40 L320 300 L160 280 L0 300 Z" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    <path d="M160 20 L160 280" stroke="#cbd5e1" stroke-width="2"/>
    
    <!-- Left page lines -->
    <g stroke="#94a3b8" stroke-width="2">
      <line x1="20" y1="60" x2="140" y2="50"/>
      <line x1="20" y1="90" x2="140" y2="80"/>
      <line x1="20" y1="120" x2="140" y2="110"/>
      <line x1="20" y1="150" x2="140" y2="140"/>
      <line x1="20" y1="180" x2="140" y2="170"/>
      <line x1="20" y1="210" x2="140" y2="200"/>
    </g>
    
    <!-- Right page lines -->
    <g stroke="#94a3b8" stroke-width="2">
      <line x1="180" y1="50" x2="300" y2="60"/>
      <line x1="180" y1="80" x2="300" y2="90"/>
      <line x1="180" y1="110" x2="300" y2="120"/>
      <line x1="180" y1="140" x2="300" y2="150"/>
      <line x1="180" y1="170" x2="300" y2="180"/>
      <line x1="180" y1="200" x2="300" y2="210"/>
    </g>
    
    <!-- Bookmark ribbon -->
    <path d="M150 0 L150 80 L160 65 L170 80 L170 0" fill="#dc2626"/>
  </g>
  
  <!-- Cross -->
  <g transform="translate(256, 380)">
    <rect x="-8" y="-30" width="16" height="60" rx="4" fill="white"/>
    <rect x="-25" y="-15" width="50" height="16" rx="4" fill="white"/>
  </g>
</svg>
